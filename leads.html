<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads | The Crash Factory</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--dark:#111;--dark2:#161616;--dark3:#222;--gray:#999;--lgray:#ccc;--white:#f0f0f0;--red:#e81a1a;--redd:#c41414;--rg:rgba(232,26,26,.25);--rs:rgba(232,26,26,.08)}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);line-height:1.55;min-height:100vh}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.icon-filled{font-variation-settings:'FILL' 1}
.ctn{max-width:1100px;margin:0 auto;padding:0 20px}
a{color:var(--red);text-decoration:none}

/* HEADER */
header{background:var(--black);border-bottom:1px solid var(--dark3);padding:14px 0;position:sticky;top:0;z-index:50}
header .ctn{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand img{height:42px}
.brand h1{font-family:'Oswald',sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:1px}
.brand h1 .red{color:var(--red)}
.htools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--dark2);border:1px solid var(--dark3);color:var(--white);
  padding:9px 15px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--red);color:var(--red)}
.btn.red{background:var(--red);border-color:var(--red);color:#fff}
.btn.red:hover{background:var(--redd);color:#fff}
.btn .material-symbols-outlined{font-size:18px}
.whoami{display:none;align-items:center;gap:8px;color:var(--gray);font-size:13px}
.whoami .urole{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--red);background:var(--rs);border:1px solid rgba(232,26,26,.3);padding:2px 7px;border-radius:4px}

/* LOGIN */
.login{position:fixed;inset:0;background:rgba(8,8,8,.97);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.login .box{background:var(--dark2);border:1px solid var(--dark3);border-radius:10px;padding:34px;max-width:380px;width:100%;text-align:center}
.login img{height:54px;margin-bottom:18px}
.login h2{font-family:'Oswald',sans-serif;font-size:24px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.login p{color:var(--gray);font-size:14px;margin-bottom:20px}
.gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;color:#222;border:none;border-radius:6px;
  padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:opacity .2s}
.gbtn:hover{opacity:.9}
.gbtn svg{width:20px;height:20px}
.orline{display:flex;align-items:center;gap:12px;color:#555;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin:18px 0}
.orline::before,.orline::after{content:'';flex:1;height:1px;background:var(--dark3)}
.login input{width:100%;background:var(--dark);border:1px solid var(--dark3);border-radius:5px;padding:12px 14px;color:#fff;font-size:15px;margin-bottom:12px}
.login input:focus{outline:none;border-color:var(--red)}
.login .err{color:var(--red);font-size:13px;margin-top:14px;min-height:16px}
.login .so{margin-top:14px;font-size:13px}
.login .so a{cursor:pointer}

/* TOOLBAR */
.toolbar{padding:22px 0 8px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:var(--dark2);border:1px solid var(--dark3);border-radius:8px;padding:14px 18px;min-width:120px}
.stat .n{font-family:'Oswald',sans-serif;font-size:30px;color:var(--red);line-height:1}
.stat .l{color:var(--gray);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ftab{background:var(--dark2);border:1px solid var(--dark3);color:var(--lgray);padding:7px 14px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.ftab.active,.ftab:hover{background:var(--red);border-color:var(--red);color:#fff}
.search{width:100%;background:var(--dark2);border:1px solid var(--dark3);border-radius:6px;padding:12px 14px;color:#fff;font-size:14px;margin-bottom:8px}
.search:focus{outline:none;border-color:var(--red)}

/* LEADS */
.leads{padding:8px 0 60px}
.lead{background:var(--dark2);border:1px solid var(--dark3);border-left:3px solid var(--red);border-radius:8px;padding:18px 20px;margin-bottom:12px}
.lead .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.lead .who{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.5px}
.lead .type{display:inline-block;background:var(--rs);border:1px solid rgba(232,26,26,.3);color:var(--red);font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:4px}
.lead .when{color:#666;font-size:12px;white-space:nowrap}
.lead .row{display:flex;gap:20px;flex-wrap:wrap;margin-top:4px}
.lead .row .it{display:inline-flex;align-items:center;gap:6px;color:var(--lgray);font-size:14px}
.lead .row .it .material-symbols-outlined{font-size:17px;color:var(--red)}
.lead .msg{color:var(--gray);font-size:14px;margin-top:10px;padding-top:10px;border-top:1px solid var(--dark3);white-space:pre-wrap}
.lead .flds{margin-top:8px;font-size:13px;color:var(--gray)}
.lead .flds b{color:var(--lgray);font-weight:600}
.empty{text-align:center;color:var(--gray);padding:60px 20px}
.empty .material-symbols-outlined{font-size:48px;color:var(--dark3);display:block;margin-bottom:12px}

/* ROLES & ACCESS BOARD (owner-only) — same look as the Blast kit */
.rbwrap{margin:4px 0 18px}
.rb{background:#0e1626;border:1px solid #28365a;border-radius:16px;padding:16px}
.rbhead{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.rbtitle{font-size:15px;font-weight:700;color:#eaf0fb}
.rbsub{font-size:11px;color:#7d8db0}
.rbnote{font-size:11px;color:#7d8db0;margin-bottom:14px}
.rberr{font-size:12px;color:#ffb4b4;background:#3a1620;border:1px solid #5a2230;border-radius:8px;padding:8px 12px;margin-bottom:12px}
.rbempty{font-size:12px;color:#7d8db0}
.rbcard{background:#18233d;border:1px solid #28365a;border-radius:12px;padding:13px 14px;margin-bottom:10px}
.rbtop{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:11px}
.rbwho{display:flex;align-items:center;gap:10px}
.rbav{width:34px;height:34px;border-radius:50%;background:#1e3a6b;color:#9cc4ff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.rbname{font-size:14px;color:#eaf0fb}
.rbemail{font-size:11px;color:#7d8db0}
.rbroles{display:flex;background:#0e1626;border:1px solid #28365a;border-radius:999px;padding:2px}
.rbrole{border:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:500;padding:4px 11px;border-radius:999px;background:transparent;color:#7d8db0;text-transform:capitalize}
.rbrole.on{background:#3b82f6;color:#0e1626;font-weight:700;cursor:default}
.rbrole:disabled{opacity:.6}
.rbacclbl{font-size:10px;color:#7d8db0;margin-bottom:6px}
.rbapps{display:flex;gap:6px;flex-wrap:wrap}
.rbapp{font-size:11px;padding:5px 10px;border-radius:7px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid #2f3e63;background:transparent;color:#7d8db0}
.rbapp.on{background:#3b82f6;color:#0e1626;border-color:#3b82f6}
.rbapp.sens{border-color:#5a3a18;color:#b07a3a}
.rbapp.sens.on{background:#7a4510;color:#ffcf8f;border-color:#7a4510}
.rbapp.locked,.rbapp:disabled{cursor:default}
.rbleg{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid #28365a;font-size:11px;color:#7d8db0}
.rbleg .lg{display:inline-block;width:10px;height:10px;border-radius:3px;border:1px solid #2f3e63;vertical-align:-1px}
.rbleg .lg.on{background:#3b82f6;border-color:#3b82f6}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <img src="logo-dark.png" alt="The Crash Factory">
    <h2>Leads</h2>
    <p>Sign in with your Crash Factory account.</p>
    <button class="gbtn" onclick="googleLogin()">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.3 5.3C41.4 35.6 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
      Continue with Google
    </button>
    <div class="orline">or</div>
    <input id="liEmail" type="email" placeholder="Email" autocomplete="username">
    <input id="liPass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')emailLogin()">
    <button class="btn red" style="width:100%;justify-content:center" onclick="emailLogin()"><span class="material-symbols-outlined">login</span> Sign In</button>
    <div class="err" id="err"></div>
    <div class="so" id="signoutRow" style="display:none"><a onclick="signOut()">Sign out</a></div>
  </div>
</div>

<!-- HEADER -->
<header><div class="ctn">
  <div class="brand"><img src="logo-dark.png" alt="The Crash Factory"><h1>Crash Factory <span class="red">Leads</span></h1></div>
  <div class="htools">
    <span class="whoami" id="whoami"><span id="uName"></span><span class="urole" id="uRole"></span></span>
    <button class="btn" onclick="loadLeads();loadRolesBoard()"><span class="material-symbols-outlined">refresh</span> Refresh</button>
    <button class="btn" onclick="exportCSV()"><span class="material-symbols-outlined">download</span> Export CSV</button>
    <button class="btn" id="hSignout" style="display:none" onclick="signOut()"><span class="material-symbols-outlined">logout</span> Sign Out</button>
    <a class="btn" href="index.html"><span class="material-symbols-outlined">home</span> Site</a>
  </div>
</div></header>

<div class="ctn">
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters"></div>
    <input class="search" id="search" placeholder="Search name, phone, email, message..." oninput="render()">
  </div>
  <!-- Owner-only Roles & Access board (mirrors the standard Five Stone kit) -->
  <div class="rbwrap" id="rolesBoard" style="display:none"></div>
  <div class="leads" id="leads"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var LEAD_API = 'https://crash-factory-pay.vercel.app/api/lead';
var CF = window.CF_CONFIG || {};
var sb = null, CF_TOKEN = '', CF_EMAIL = '', CF_UID = '', ALL = [], filterType = 'all';

function loginErr(m){ document.getElementById('err').textContent = m || ''; }
function showSignoutLink(show){ document.getElementById('signoutRow').style.display = show ? 'block' : 'none'; }

async function googleLogin(){
  if(!sb) return loginErr('Login is not configured.');
  loginErr('');
  await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin + location.pathname } });
}
async function emailLogin(){
  if(!sb) return loginErr('Login is not configured.');
  loginErr('');
  var email = document.getElementById('liEmail').value.trim();
  var password = document.getElementById('liPass').value;
  var resp = await sb.auth.signInWithPassword({ email:email, password:password });
  if(resp.error) loginErr(resp.error.message);
}
async function signOut(){ if(sb) await sb.auth.signOut(); }

async function onSession(session){
  if(session && session.user){
    CF_TOKEN = session.access_token || '';
    CF_EMAIL = session.user.email || '';
    CF_UID = session.user.id;
    var role = 'staff';
    try{
      var r = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      if(r.data && r.data.role) role = r.data.role;
    }catch(e){ /* profile may not exist yet -> staff */ }

    // Access model (same as Blast): the owner ALWAYS gets in (can't lock self out);
    // admins reach everything; otherwise the person needs an enabled app_access
    // row for this site ('crash').
    var hasAccess = (role === 'admin') || rbIsOwner(CF_EMAIL);
    if(!hasAccess){
      try{
        var aa = await sb.from('app_access').select('enabled').eq('user_id', session.user.id).eq('app', CF.THIS_APP || 'crash').maybeSingle();
        hasAccess = !!(aa.data && aa.data.enabled);
      }catch(e){ hasAccess = false; }
    }

    if(hasAccess){
      var name = (session.user.user_metadata && session.user.user_metadata.full_name) || session.user.email || 'Signed in';
      document.getElementById('uName').textContent = name;
      document.getElementById('uRole').textContent = role;
      document.getElementById('whoami').style.display = 'flex';
      document.getElementById('hSignout').style.display = 'inline-flex';
      document.getElementById('login').style.display = 'none';
      document.getElementById('toolbar').style.display = 'block';
      loadLeads();
      loadRolesBoard(); // owner-only inside; no-op for non-owners
    } else {
      // Signed in but not allowed into this site.
      document.getElementById('login').style.display = 'flex';
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('leads').innerHTML = '';
      document.getElementById('rolesBoard').style.display = 'none';
      loginErr('This account (' + (session.user.email||'') + ') does not have Crash Factory access. Ask the owner to grant it, or sign out.');
      showSignoutLink(true);
    }
  } else {
    CF_TOKEN = ''; CF_EMAIL = ''; CF_UID = '';
    document.getElementById('whoami').style.display = 'none';
    document.getElementById('hSignout').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
    document.getElementById('toolbar').style.display = 'none';
    document.getElementById('rolesBoard').style.display = 'none';
    showSignoutLink(false);
  }
}

// ============================================
// ROLES & ACCESS BOARD (owner-only) — vanilla port of the standard Five Stone
// kit (RolesAccessBoard.jsx). Reads shared profiles + app_access, lets the owner
// set each person's role and toggle which sites they can reach. RLS is the real
// gate: a non-owner who somehow loads this can't read or write anything.
// ============================================
var APPS = CF.APPS || [];
var rbRows = [], rbAccess = {}, rbBusy = '';
function rbIsOwner(email){
  var list = (CF.OWNER_EMAILS || []).map(function(e){ return String(e).toLowerCase(); });
  return !!email && list.indexOf(String(email).toLowerCase()) >= 0;
}
async function loadRolesBoard(){
  var wrap = document.getElementById('rolesBoard');
  if(!wrap) return;
  if(!rbIsOwner(CF_EMAIL)){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  try{
    var p = await sb.from('profiles').select('id,email,full_name,role').order('full_name');
    if(p.error) throw p.error;
    var a = await sb.from('app_access').select('user_id,app,enabled');
    if(a.error) throw a.error;
    rbRows = p.data || []; rbAccess = {};
    (a.data || []).forEach(function(r){ (rbAccess[r.user_id] = rbAccess[r.user_id] || {})[r.app] = r.enabled; });
    renderRolesBoard('');
  }catch(e){ renderRolesBoard(e.message || String(e)); }
}
async function rbSetRole(userId, role){
  rbBusy = userId + ':role'; renderRolesBoard('');
  await sb.from('profiles').update({ role: role }).eq('id', userId);
  rbBusy = ''; loadRolesBoard();
}
async function rbToggle(userId, app, on){
  rbBusy = userId + ':' + app; renderRolesBoard('');
  await sb.from('app_access').upsert({ user_id: userId, app: app, enabled: !on, updated_at: new Date().toISOString() }, { onConflict: 'user_id,app' });
  rbBusy = ''; loadRolesBoard();
}
function rbInitials(name, email){
  var s = (name || email || '?').trim();
  var parts = s.split(/[\s@.]+/).filter(Boolean);
  return ((parts[0] || '?')[0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}
var ROLES = ['admin','manager','staff'];
function renderRolesBoard(err){
  var wrap = document.getElementById('rolesBoard');
  var h = '<div class="rb"><div class="rbhead"><span class="rbtitle">Roles &amp; Access</span>'
    + '<span class="rbsub">owner-only &middot; you see everyone &times; every site</span></div>'
    + '<div class="rbnote">Active = blue. Sensitive sites flagged. Role limits what a person can do even where they have access. Admins reach every site.</div>';
  if(err){ h += '<div class="rberr">Could not load (' + esc(err) + '). If the tables or redirect URLs are not set up yet, finish the Supabase steps first.</div>'; }
  if(!rbRows.length && !err){ h += '<div class="rbempty">No one has signed in yet. People appear here after their first Google sign-in.</div>'; }
  rbRows.forEach(function(p){
    var isAdmin = p.role === 'admin';
    var ownerRow = rbIsOwner(p.email); // can't change the owner's own role (no self-lockout)
    h += '<div class="rbcard"><div class="rbtop"><div class="rbwho"><div class="rbav">' + esc(rbInitials(p.full_name, p.email)) + '</div>'
      + '<div><div class="rbname">' + esc(p.full_name || p.email) + (ownerRow ? ' <span style="font-size:10px;color:#7d8db0">(owner)</span>' : '') + '</div><div class="rbemail">' + esc(p.email || '') + '</div></div></div>'
      + '<div class="rbroles">';
    ROLES.forEach(function(rl){
      var on = p.role === rl;
      var dis = (ownerRow || rbBusy === p.id + ':role') ? ' disabled' : '';
      h += '<button class="rbrole' + (on ? ' on' : '') + '"' + dis + ' onclick="' + ((on || ownerRow) ? '' : "rbSetRole('" + p.id + "','" + rl + "')") + '">' + rl + '</button>';
    });
    h += '</div></div><div class="rbacclbl">Access</div><div class="rbapps">';
    APPS.forEach(function(app){
      var on = isAdmin || !!(rbAccess[p.id] && rbAccess[p.id][app.key]);
      var cls = 'rbapp' + (app.sensitive ? ' sens' : '') + (on ? ' on' : '') + (isAdmin ? ' locked' : '');
      var dis = (isAdmin || rbBusy === p.id + ':' + app.key) ? ' disabled' : '';
      var ttl = isAdmin ? 'Admins reach every site' : (on ? 'Click to revoke' : 'Click to grant');
      var lock = app.sensitive ? '<span class="material-symbols-outlined" style="font-size:13px;vertical-align:-2px">lock</span> ' : '';
      h += '<button class="' + cls + '"' + dis + ' title="' + ttl + '" onclick="' + (isAdmin ? '' : "rbToggle('" + p.id + "','" + app.key + "'," + on + ")") + '">' + lock + esc(app.label) + '</button>';
    });
    h += '</div></div>';
  });
  h += '<div class="rbleg"><span><i class="lg on"></i> has access</span><span><i class="lg"></i> no access</span>'
    + '<span><span class="material-symbols-outlined" style="font-size:13px;vertical-align:-2px">lock</span> sensitive (financial / credit)</span></div></div>';
  wrap.innerHTML = h;
}

async function loadLeads(){
  if(!CF_TOKEN) return false;
  try{
    var res = await fetch(LEAD_API, { headers:{ 'Authorization':'Bearer ' + CF_TOKEN }, cache:'no-store' });
    if(res.status === 401){ loginErr('Not authorized to read leads.'); return false; }
    var data = await res.json();
    ALL = Array.isArray(data.leads) ? data.leads : [];
    render();
    return true;
  }catch(e){
    alert('Could not load leads: ' + e.message);
    return false;
  }
}

function uniqueTypes(){
  var t = {};
  ALL.forEach(function(l){ t[l.type||'lead'] = (t[l.type||'lead']||0)+1; });
  return t;
}

function render(){
  var types = uniqueTypes();
  var stats = document.getElementById('stats');
  var statHtml = '<div class="stat"><div class="n">'+ALL.length+'</div><div class="l">Total Leads</div></div>';
  Object.keys(types).sort().forEach(function(t){
    statHtml += '<div class="stat"><div class="n">'+types[t]+'</div><div class="l">'+t+'</div></div>';
  });
  stats.innerHTML = statHtml;

  var f = document.getElementById('filters');
  var fHtml = '<div class="ftab'+(filterType==='all'?' active':'')+'" onclick="setFilter(\'all\')">All</div>';
  Object.keys(types).sort().forEach(function(t){
    fHtml += '<div class="ftab'+(filterType===t?' active':'')+'" onclick="setFilter(\''+t+'\')">'+t+'</div>';
  });
  f.innerHTML = fHtml;

  var q = (document.getElementById('search').value||'').toLowerCase();
  var list = ALL.filter(function(l){
    if(filterType!=='all' && (l.type||'lead')!==filterType) return false;
    if(q){
      var hay = (l.name+' '+l.phone+' '+l.email+' '+l.message+' '+JSON.stringify(l.fields||{})).toLowerCase();
      if(hay.indexOf(q)===-1) return false;
    }
    return true;
  });
  var box = document.getElementById('leads');
  if(!list.length){
    box.innerHTML = '<div class="empty"><span class="material-symbols-outlined">inbox</span>No leads yet. New form submissions will show up here.</div>';
    return;
  }
  box.innerHTML = list.map(leadCard).join('');
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

function leadCard(l){
  var when = '';
  try{ when = new Date(l.createdAt).toLocaleString('en-US',{timeZone:'America/Chicago'}); }catch(e){ when = l.createdAt||''; }
  var fields = (l.fields && Object.keys(l.fields).length)
    ? '<div class="flds">'+Object.keys(l.fields).map(function(k){return '<b>'+esc(k)+':</b> '+esc(l.fields[k]);}).join(' &nbsp;&bull;&nbsp; ')+'</div>'
    : '';
  return '<div class="lead">'
    + '<div class="top"><div><span class="who">'+esc(l.name||'No name')+'</span> &nbsp; <span class="type">'+esc(l.type||'lead')+'</span></div><div class="when">'+esc(when)+'</div></div>'
    + '<div class="row">'
    + (l.phone?'<a class="it" href="tel:'+esc(l.phone)+'"><span class="material-symbols-outlined">call</span>'+esc(l.phone)+'</a>':'')
    + (l.email?'<a class="it" href="mailto:'+esc(l.email)+'"><span class="material-symbols-outlined">mail</span>'+esc(l.email)+'</a>':'')
    + '</div>'
    + (l.message?'<div class="msg">'+esc(l.message)+'</div>':'')
    + fields
    + '</div>';
}

function setFilter(t){ filterType = t; render(); }

function exportCSV(){
  if(!ALL.length){ alert('No leads to export.'); return; }
  var cols = ['createdAt','type','name','phone','email','message','fields'];
  var rows = [cols.join(',')];
  ALL.forEach(function(l){
    var vals = cols.map(function(c){
      var v = c==='fields' ? JSON.stringify(l.fields||{}) : (l[c]==null?'':l[c]);
      return '"'+String(v).replace(/"/g,'""')+'"';
    });
    rows.push(vals.join(','));
  });
  var blob = new Blob([rows.join('\n')], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'crashfactory-leads.csv';
  a.click();
}
